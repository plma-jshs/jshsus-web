services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: jshsus
      MYSQL_USER: ${MYSQL_USER:-jshs_web}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-local_mysql_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-local_mysql_root_password}
      TZ: Asia/Seoul
    expose:
      - '3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-local_redis_password}
    command: ['sh', '-c', 'redis-server --requirepass "$$REDIS_PASSWORD"']
    expose:
      - '6379'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-mysql://${MYSQL_USER:-jshs_web}:${MYSQL_PASSWORD:-local_mysql_password}@mysql:3306/jshsus}
      DATABASE_SSL_MODE: disabled
      REDIS_URL: redis://:${REDIS_PASSWORD:-local_redis_password}@redis:6379/0
      FILE_LOCAL_DIR: /var/lib/jshsus/uploads
      # Local Compose stores uploads in upload-data. Production injects S3
      # credentials through docker-compose.release.yml instead.
      S3_BUCKET: ''
      S3_PUBLIC_BASE_URL: ''
      S3_ENDPOINT: ''
      AWS_ACCESS_KEY_ID: ''
      AWS_SECRET_ACCESS_KEY: ''
    volumes:
      - upload-data:/var/lib/jshsus/uploads
    ports:
      - '${API_PORT:-4000}:4000'
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:4000/api/health']
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-mysql://${MYSQL_USER:-jshs_web}:${MYSQL_PASSWORD:-local_mysql_password}@mysql:3306/jshsus}
      DATABASE_SSL_MODE: disabled
      ALLOW_LOCAL_SEED: ${ALLOW_LOCAL_SEED:-false}
      TEST_USER_USERNAME: ${TEST_USER_USERNAME:-test.student}
      TEST_USER_PASSWORD: ${TEST_USER_PASSWORD:-Test1234!}
      TEST_USER_STUDENT_NO: ${TEST_USER_STUDENT_NO:-29999}
    profiles: ['tools']

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '${WEB_PORT:-5173}:80'
    depends_on:
      api:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    ports:
      - '${ADMIN_PORT:-5174}:80'
    depends_on:
      api:
        condition: service_healthy

volumes:
  mysql-data:
    name: ${MYSQL_VOLUME_NAME:-jshs_web_mysql-data}
  upload-data:
