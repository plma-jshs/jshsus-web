name: Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('jshsus-v26-pr-{0}', github.event.pull_request.number) || 'jshsus-v26-production' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable pnpm
        run: |
          corepack enable
          corepack install --global pnpm@10.30.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Production dependency audit
        run: pnpm audit --prod --audit-level high

      - name: Drizzle schema check
        run: |
          pnpm db:generate
          git diff --exit-code -- packages/db/migrations

      - name: Backward-compatible migration policy
        run: pnpm db:migrations:check

      - name: Clean database migration apply check
        run: pnpm db:migrations:apply-check

  build-images:
    name: Build ${{ matrix.image }} image
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: apps/api/Dockerfile
          - image: web
            dockerfile: apps/web/Dockerfile
          - image: admin
            dockerfile: apps/admin/Dockerfile
          - image: migrate
            dockerfile: packages/db/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set Docker config directory
        shell: bash
        run: echo "DOCKER_CONFIG=$RUNNER_TEMP/docker-auth" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        shell: bash
        run: |
          set -euo pipefail
          docker buildx create --name jshsus-builder --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Prepare GitHub Container Registry auth
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$DOCKER_CONFIG"
          auth="$(printf '%s:%s' "${{ github.actor }}" "$GHCR_TOKEN" | base64 | tr -d '\n')"
          cat > "$DOCKER_CONFIG/config.json" <<EOF
          {"auths":{"ghcr.io":{"auth":"$auth"}}}
          EOF

      - name: Check for an existing immutable SHA image
        id: image
        shell: bash
        run: |
          image="ghcr.io/${{ github.repository_owner }}/jshsus-${{ matrix.image }}:${{ github.sha }}"
          if docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
            echo 'exists=true' >> "$GITHUB_OUTPUT"
          else
            echo 'exists=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        if: steps.image.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${{ github.repository_owner }}/jshsus-${{ matrix.image }}"
          docker buildx build . \
            --file "${{ matrix.dockerfile }}" \
            --platform linux/amd64 \
            --push \
            --tag "$image:${{ github.sha }}" \
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.title=jshsus-${{ matrix.image }}" \
            --cache-from "type=registry,ref=$image:buildcache" \
            --cache-to "type=registry,ref=$image:buildcache,mode=max" \
            --provenance=mode=max \
            --sbom=true

  prepare-images:
    name: Prepare release image tags
    needs: build-images
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set Docker config directory
        shell: bash
        run: echo "DOCKER_CONFIG=$RUNNER_TEMP/docker-auth" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        shell: bash
        run: |
          set -euo pipefail
          docker buildx create --name jshsus-builder --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Prepare GitHub Container Registry auth
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$DOCKER_CONFIG"
          auth="$(printf '%s:%s' "${{ github.actor }}" "$GHCR_TOKEN" | base64 | tr -d '\n')"
          cat > "$DOCKER_CONFIG/config.json" <<EOF
          {"auths":{"ghcr.io":{"auth":"$auth"}}}
          EOF

      - name: Validate the complete release and preserve stable as previous
        shell: bash
        run: |
          set -euo pipefail
          images=(api web admin migrate)
          for name in "${images[@]}"; do
            docker buildx imagetools inspect \
              "ghcr.io/${{ github.repository_owner }}/jshsus-$name:${{ github.sha }}" >/dev/null
          done
          for name in "${images[@]}"; do
            image="ghcr.io/${{ github.repository_owner }}/jshsus-$name"
            if docker buildx imagetools inspect "$image:stable" >/dev/null 2>&1; then
              docker buildx imagetools create --tag "$image:previous" "$image:stable"
            fi
          done

  deploy:
    name: Deploy staging
    needs:
      - verify
      - prepare-images
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Refuse an obsolete main workflow rerun
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin \
            '+refs/heads/main:refs/remotes/origin/main'
          test "$(git rev-parse origin/main)" = "$GITHUB_SHA"

      - name: Validate deployment settings
        shell: bash
        run: |
          set -euo pipefail
          [[ "$DEPLOY_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ "$DEPLOY_PORT" =~ ^[0-9]{1,5}$ ]]
          (( DEPLOY_PORT >= 1 && DEPLOY_PORT <= 65535 ))
          [[ "$DEPLOY_USER" =~ ^[a-z_][a-z0-9_-]*$ ]]
          [[ "$DEPLOY_PATH" =~ ^/[A-Za-z0-9._/-]+$ ]]

      - name: Configure pinned SSH identity
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 700 "$HOME/.ssh"
          umask 077
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/deploy_key"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          ssh-keygen -y -f "$HOME/.ssh/deploy_key" >/dev/null
          test -s "$HOME/.ssh/known_hosts"

      - name: Prepare protected production environment file
        shell: bash
        env:
          PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_WEB_CLIENT_ID: ${{ secrets.COGNITO_WEB_CLIENT_ID }}
          COGNITO_WEB_CLIENT_SECRET: ${{ secrets.COGNITO_WEB_CLIENT_SECRET }}
          COGNITO_ADMIN_CLIENT_ID: ${{ secrets.COGNITO_ADMIN_CLIENT_ID }}
          COGNITO_ADMIN_CLIENT_SECRET: ${{ secrets.COGNITO_ADMIN_CLIENT_SECRET }}
          SENDON_API_KEY: ${{ secrets.SENDON_API_KEY }}
          SENDON_ACCOUNT_ID: ${{ secrets.SENDON_ACCOUNT_ID }}
          SENDON_KAKAO_SEND_PROFILE_ID: ${{ secrets.SENDON_KAKAO_SEND_PROFILE_ID }}
          SENDON_PASSWORD_RESET_TEMPLATE_ID: ${{ secrets.SENDON_PASSWORD_RESET_TEMPLATE_ID }}
          SENDON_SMS_SENDER_NUMBER: ${{ secrets.SENDON_SMS_SENDER_NUMBER }}
        run: |
          set -euo pipefail
          umask 077

          require_scalar_secret() {
            local name="$1"
            local value="${!name}"
            if [[ -z "$value" ]]; then
              printf '::error::Required production secret %s is missing.\n' "$name" >&2
              return 1
            fi
            if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
              printf '::error::Required production secret %s must be a single line.\n' "$name" >&2
              return 1
            fi
          }

          set_optional_env_value() {
            local key="$1"
            local value="${!key}"
            if [[ -z "$value" ]]; then
              return 0
            fi
            if [[ "$value" == *$'\n'* || "$value" == *$'\r'* ]]; then
              printf '::error::Production secret %s must be a single line.\n' "$key" >&2
              return 1
            fi
            set_env_value "$key" "$value"
          }

          set_env_value() {
            local key="$1"
            local value="$2"
            local next_file
            next_file="$(mktemp .env.production.XXXXXX)"
            awk -v key="$key" '
              {
                candidate = $0
                sub(/^[[:space:]]*/, "", candidate)
                sub(/^export[[:space:]]+/, "", candidate)
                if (candidate !~ ("^" key "[[:space:]]*=")) {
                  print
                }
              }
            ' .env.production > "$next_file"
            printf '%s=%s\n' "$key" "$value" >> "$next_file"
            chmod 600 "$next_file"
            mv "$next_file" .env.production
          }

          test -n "$PRODUCTION_ENV_FILE"
          for secret_name in \
            NEIS_API_KEY \
            YOUTUBE_API_KEY \
            COGNITO_USER_POOL_ID \
            COGNITO_WEB_CLIENT_ID \
            COGNITO_WEB_CLIENT_SECRET \
            COGNITO_ADMIN_CLIENT_ID \
            COGNITO_ADMIN_CLIENT_SECRET \
            SENDON_API_KEY; do
            require_scalar_secret "$secret_name"
          done

          printf '%s\n' "$PRODUCTION_ENV_FILE" > .env.production
          set_env_value NEIS_API_KEY "$NEIS_API_KEY"
          set_env_value YOUTUBE_API_KEY "$YOUTUBE_API_KEY"
          set_env_value AUTH_MODE hybrid
          set_env_value SESSION_COOKIE_HOST_ONLY true
          set_env_value SESSION_COOKIE_SECURE true
          set_env_value IAM_COOKIE_NAME __Host-jshsus-v26.sid
          set_env_value CSRF_COOKIE_NAME __Host-jshsus-v26.csrf
          set_env_value COGNITO_REGION ap-northeast-2
          set_env_value COGNITO_USER_POOL_ID "$COGNITO_USER_POOL_ID"
          set_env_value COGNITO_WEB_CLIENT_ID "$COGNITO_WEB_CLIENT_ID"
          set_env_value COGNITO_WEB_CLIENT_SECRET "$COGNITO_WEB_CLIENT_SECRET"
          set_env_value COGNITO_ADMIN_CLIENT_ID "$COGNITO_ADMIN_CLIENT_ID"
          set_env_value COGNITO_ADMIN_CLIENT_SECRET "$COGNITO_ADMIN_CLIENT_SECRET"
          set_env_value SENDON_API_KEY "$SENDON_API_KEY"
          set_optional_env_value SENDON_ACCOUNT_ID
          set_optional_env_value SENDON_KAKAO_SEND_PROFILE_ID
          set_optional_env_value SENDON_PASSWORD_RESET_TEMPLATE_ID
          set_optional_env_value SENDON_SMS_SENDER_NUMBER

      - name: Authenticate the server to GHCR
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ghcr_auth="$(printf '%s:%s' '${{ github.actor }}' "$GHCR_TOKEN" | base64 | tr -d '\n')"
          ssh -i "$HOME/.ssh/deploy_key" -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "bash -s -- '$DEPLOY_PATH'" <<REMOTE_GHCR_AUTH
          set -euo pipefail
          deploy_path="\$1"
          install -d -m 700 "\$deploy_path"
          auth_dir="\$(mktemp -d "\$deploy_path/.docker-auth.XXXXXX")"
          chmod 700 "\$auth_dir"
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}\n' "$ghcr_auth" > "\$auth_dir/config.json"
          chmod 600 "\$auth_dir/config.json"
          printf '%s\n' "\$auth_dir" > "\$deploy_path/.docker-auth-path"
          chmod 600 "\$deploy_path/.docker-auth-path"
          REMOTE_GHCR_AUTH

      - name: Upload release manifest
        shell: bash
        run: |
          set -euo pipefail
          SSH=(ssh -i "$HOME/.ssh/deploy_key" -p "$DEPLOY_PORT")
          SCP=(scp -i "$HOME/.ssh/deploy_key" -P "$DEPLOY_PORT")

          "${SSH[@]}" "$DEPLOY_USER@$DEPLOY_HOST" \
            "install -d -m 700 '$DEPLOY_PATH'"
          "${SCP[@]}" docker-compose.release.yml deploy/deploy.sh \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          "${SCP[@]}" .env.production \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env.next"
          "${SSH[@]}" "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && chmod 600 .env.next docker-compose.release.yml && chmod 700 deploy.sh"

      - name: Run release
        id: release
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/deploy_key" -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "DOCKER_CONFIG=\"\$(cat '$DEPLOY_PATH/.docker-auth-path')\" '$DEPLOY_PATH/deploy.sh' '${{ github.sha }}' '${{ github.repository_owner }}'"

      - name: Verify staging content or Cloudflare edge reachability
        id: public_smoke
        if: vars.STAGING_WEB_URL != ''
        shell: bash
        env:
          STAGING_WEB_URL: ${{ vars.STAGING_WEB_URL }}
          STAGING_ADMIN_URL: ${{ vars.STAGING_ADMIN_URL }}
        run: |
          set -euo pipefail
          [[ "$STAGING_WEB_URL" =~ ^https://[A-Za-z0-9.-]+/?$ ]]
          if [[ -n "$STAGING_ADMIN_URL" ]]; then
            [[ "$STAGING_ADMIN_URL" =~ ^https://[A-Za-z0-9.-]+/?$ ]]
          fi

          ssh -i "$HOME/.ssh/deploy_key" -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "bash -s -- '$STAGING_WEB_URL' '$STAGING_ADMIN_URL'" <<'REMOTE_SMOKE'
          set -euo pipefail

          web_url="${1%/}"
          admin_url="${2%/}"

          probe() {
            local label="$1"
            local url="$2"
            local expected="$3"
            local response_file headers_file status server cf_ray
            response_file="$(mktemp)"
            headers_file="$(mktemp)"

            for attempt in {1..18}; do
              : > "$response_file"
              : > "$headers_file"
              status="$(
                curl --silent --show-error --location --max-time 10 \
                  --user-agent 'jshsus-deploy-smoke/1.0' \
                  --dump-header "$headers_file" \
                  --output "$response_file" \
                  --write-out '%{http_code}' \
                  "$url" || true
              )"

              if [[ "$status" =~ ^2[0-9]{2}$ ]]; then
                if [[ "$expected" != 'health' ]] || grep -q '"status":"ok"' "$response_file"; then
                  printf 'Smoke check passed: label=%s url=%s status=%s\n' "$label" "$url" "$status"
                  rm -f "$response_file" "$headers_file"
                  return 0
                fi
              fi

              server="$(awk -F ': *' 'tolower($1) == "server" { gsub("\\r", "", $2); print $2 }' "$headers_file" | tail -n 1)"
              cf_ray="$(awk -F ': *' 'tolower($1) == "cf-ray" { gsub("\\r", "", $2); print $2 }' "$headers_file" | tail -n 1)"
              if [[ "$status" == '403' && "${server,,}" == 'cloudflare' && -n "$cf_ray" ]]; then
                printf 'Smoke check advisory: label=%s url=%s status=403 server=cloudflare cf-ray=%s result=edge-reachable-automation-blocked\n' \
                  "$label" "$url" "$cf_ray"
                rm -f "$response_file" "$headers_file"
                return 0
              fi
              printf 'Smoke check failed: label=%s url=%s attempt=%s status=%s server=%s cf-ray=%s\n' \
                "$label" "$url" "$attempt" "${status:-curl-error}" "${server:-unknown}" "${cf_ray:-none}"
              sleep 5
            done

            rm -f "$response_file" "$headers_file"
            return 1
          }

          command -v curl >/dev/null
          probe 'web health' "$web_url/api/health" health
          probe 'web page' "$web_url/" page
          if [[ -n "$admin_url" ]]; then
            probe 'admin page' "$admin_url/" page
          fi
          REMOTE_SMOKE

      - name: Roll back a release that failed public verification
        if: failure() && steps.release.outcome == 'success' && steps.public_smoke.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/deploy_key" -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "'$DEPLOY_PATH/deploy.sh' --rollback '${{ github.repository_owner }}'"

      - name: Remove the server GHCR credential
        if: always()
        shell: bash
        run: |
          if [[ -s "$HOME/.ssh/deploy_key" ]]; then
            ssh -i "$HOME/.ssh/deploy_key" -p "$DEPLOY_PORT" \
              "$DEPLOY_USER@$DEPLOY_HOST" \
              "if [[ -f '$DEPLOY_PATH/.docker-auth-path' ]]; then auth_dir=\"\$(cat '$DEPLOY_PATH/.docker-auth-path')\"; rm -rf -- \"\$auth_dir\" '$DEPLOY_PATH/.docker-auth-path'; fi; rm -rf -- '$DEPLOY_PATH/.docker-auth'" || true
          fi

      - name: Remove local secret files
        if: always()
        shell: bash
        run: rm -f "$HOME/.ssh/deploy_key" .env.production

  apply-aws-retention:
    name: Apply AWS retention policies
    needs: deploy
    if: github.ref == 'refs/heads/main' && (vars.ECR_REPOSITORIES != '' || vars.CLOUDWATCH_LOG_GROUPS != '')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      ECR_REPOSITORIES: ${{ vars.ECR_REPOSITORIES }}
      ECR_KEEP_LAST: ${{ vars.ECR_KEEP_LAST || '30' }}
      CLOUDWATCH_LOG_GROUPS: ${{ vars.CLOUDWATCH_LOG_GROUPS }}
      CLOUDWATCH_LOG_RETENTION_DAYS: ${{ vars.CLOUDWATCH_LOG_RETENTION_DAYS || '30' }}
    steps:
      - name: Apply ECR lifecycle and CloudWatch log retention
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$AWS_ACCESS_KEY_ID" || -z "$AWS_SECRET_ACCESS_KEY" ]]; then
            printf '::error::AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY are required when AWS retention vars are configured.\n' >&2
            exit 1
          fi
          if ! [[ "$ECR_KEEP_LAST" =~ ^[0-9]+$ ]] || (( ECR_KEEP_LAST < 2 || ECR_KEEP_LAST > 1000 )); then
            printf '::error::ECR_KEEP_LAST must be between 2 and 1000.\n' >&2
            exit 1
          fi
          case "$CLOUDWATCH_LOG_RETENTION_DAYS" in
            1|3|5|7|14|30|60|90|120|150|180|365|400|545|731|1096|1827|2192|2557|2922|3288|3653) ;;
            *)
              printf '::error::CLOUDWATCH_LOG_RETENTION_DAYS is not a supported CloudWatch retention value.\n' >&2
              exit 1
              ;;
          esac

          if [[ -n "$ECR_REPOSITORIES" ]]; then
            policy_file="$(mktemp)"
            cat > "$policy_file" <<POLICY
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images after 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 100,
                "description": "Keep only the most recent ${ECR_KEEP_LAST} images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": ${ECR_KEEP_LAST}
                },
                "action": { "type": "expire" }
              }
            ]
          }
          POLICY
            while IFS= read -r repository; do
              [[ -n "$repository" ]] || continue
              aws ecr put-lifecycle-policy \
                --repository-name "$repository" \
                --lifecycle-policy-text "file://$policy_file"
              printf 'Applied ECR lifecycle policy: %s\n' "$repository"
            done < <(tr ', ' '\n\n' <<< "$ECR_REPOSITORIES")
          fi

          if [[ -n "$CLOUDWATCH_LOG_GROUPS" ]]; then
            while IFS= read -r log_group; do
              [[ -n "$log_group" ]] || continue
              aws logs put-retention-policy \
                --log-group-name "$log_group" \
                --retention-in-days "$CLOUDWATCH_LOG_RETENTION_DAYS"
              printf 'Applied CloudWatch retention: %s days=%s\n' \
                "$log_group" "$CLOUDWATCH_LOG_RETENTION_DAYS"
            done < <(tr ', ' '\n\n' <<< "$CLOUDWATCH_LOG_GROUPS")
          fi

  promote-images:
    name: Promote release images
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote successful SHA to stable
        shell: bash
        run: |
          set -euo pipefail
          images=(api web admin migrate)
          for name in "${images[@]}"; do
            docker buildx imagetools inspect \
              "ghcr.io/${{ github.repository_owner }}/jshsus-$name:${{ github.sha }}" >/dev/null
          done
          for name in "${images[@]}"; do
            image="ghcr.io/${{ github.repository_owner }}/jshsus-$name"
            docker buildx imagetools create --tag "$image:stable" "$image:${{ github.sha }}"
          done

  prune-ghcr-images:
    name: Prune old GHCR image versions
    needs: promote-images
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GHCR_RETAINED_VERSION_COUNT: ${{ vars.GHCR_RETAINED_VERSION_COUNT || '30' }}
      OWNER: ${{ github.repository_owner }}
    steps:
      - name: Delete old immutable SHA image versions
        shell: bash
        run: |
          set -euo pipefail
          if ! [[ "$GHCR_RETAINED_VERSION_COUNT" =~ ^[0-9]+$ ]] || (( GHCR_RETAINED_VERSION_COUNT < 2 || GHCR_RETAINED_VERSION_COUNT > 500 )); then
            printf '::error::GHCR_RETAINED_VERSION_COUNT must be between 2 and 500.\n' >&2
            exit 1
          fi

          if gh api "/orgs/$OWNER" >/dev/null 2>&1; then
            owner_path="/orgs/$OWNER"
          else
            owner_path="/users/$OWNER"
          fi

          for name in api web admin migrate; do
            package="jshsus-$name"
            versions_file="$(mktemp)"
            if ! gh api --paginate "$owner_path/packages/container/$package/versions?per_page=100" \
              --jq '.[] | @base64' > "$versions_file"; then
              printf 'Skipping GHCR prune; package not found or unavailable: %s\n' "$package" >&2
              rm -f "$versions_file"
              continue
            fi

            eligible_file="$(mktemp)"
            while IFS= read -r version_payload; do
              [[ -n "$version_payload" ]] || continue
              decoded="$(printf '%s' "$version_payload" | base64 -d)"
              id="$(jq -r '.id' <<< "$decoded")"
              created_at="$(jq -r '.created_at' <<< "$decoded")"
              tags="$(jq -r '(.metadata.container.tags // []) | join(",")' <<< "$decoded")"
              if [[ "$tags" =~ (^|,)(stable|previous|buildcache)(,|$) ]]; then
                continue
              fi
              if [[ "$tags" =~ (^|,)[0-9a-f]{40}(,|$) ]]; then
                printf '%s %s %s\n' "$created_at" "$id" "$tags" >> "$eligible_file"
              fi
            done < "$versions_file"

            retained=0
            while read -r _created_at id tags; do
              [[ -n "${id:-}" ]] || continue
              retained=$((retained + 1))
              if (( retained <= GHCR_RETAINED_VERSION_COUNT )); then
                continue
              fi
              gh api --method DELETE "$owner_path/packages/container/$package/versions/$id"
              printf 'Deleted old GHCR image version: package=%s id=%s tags=%s\n' \
                "$package" "$id" "$tags"
            done < <(sort -r "$eligible_file")

            rm -f "$versions_file" "$eligible_file"
          done
