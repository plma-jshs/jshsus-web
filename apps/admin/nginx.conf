map $http_x_real_ip $trusted_client_ip {
  default $http_x_real_ip;
  '' $remote_addr;
}

map $http_x_forwarded_proto $trusted_forwarded_proto {
  default $http_x_forwarded_proto;
  '' $scheme;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  client_max_body_size 12m;

  location /api/ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    # Nginx Proxy Manager overwrites X-Real-IP after validating trusted edge ranges.
    proxy_set_header X-Real-IP $trusted_client_ip;
    proxy_set_header X-Forwarded-For $trusted_client_ip;
    proxy_set_header X-Forwarded-Proto $trusted_forwarded_proto;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }
}
